#+Moins de warnings Kotlin
kotlin.daemon.useFallbackStrategy=false
#+ d?finit le style de code Kotlin utilis? par le plugin Gradle.
kotlin.code.style=official
#+ active le mode exp?rimental V2 du plugin Dokka (g?n?rateur de documentation pour Kotlin).
org.jetbrains.dokka.experimental.gradle.pluginMode=V2Enabled
