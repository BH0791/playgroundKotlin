#* Active le daemon Gradle (?vite de relancer une JVM ? chaque build)
org.gradle.daemon=true
#* Active l?ex?cution parall?le des modules ind?pendants
org.gradle.parallel=true
#* Active le cache de build pour r?utiliser les t?ches d?j? compil?es
org.gradle.caching=true
